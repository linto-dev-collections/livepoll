name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    # @livepoll/env/web で required な NEXT_PUBLIC_* は next.config.ts の
    # side-effect import (`import "@livepoll/env/web"`) で module load 時に検証される。
    # `next typegen` / `next build` どちらも next.config.ts を eval するため、
    # Type check / Build / 将来追加される全 step が同じ env を必要とする。
    # vars が未設定でも CI が落ちないよう、本番想定値をフォールバックとして指定する
    # (実際の値は Repository Variables / Secrets から供給される)。
    env:
      NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL || 'https://api.livepoll.example.com' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://livepoll.example.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm biome ci .

      - name: Check unused exports (Knip)
        run: pnpm knip

      - name: Type check
        run: pnpm check-types

      - name: Check import boundaries (dependency-cruiser)
        run: pnpm depcruise

      - name: Build
        run: pnpm build

  deploy:
    # CI 合格を必須にする (型エラー / lint 失敗時の誤 deploy を防ぐ)。
    # PR では deploy job は走らない (if 条件で main への push のみに限定)。
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm run deploy
        env:
          # Alchemy
          ALCHEMY_DEPLOY: "1"
          ALCHEMY_STAGE: prod
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}

          # Cloudflare
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

          # App config (non-secret)
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}

          # App secrets
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          # Better Auth Google Sign-in (scope: openid email profile)
          # redirect URI は Better Auth 既定の `${BETTER_AUTH_URL}/api/auth/callback/google`
          GOOGLE_SIGNIN_CLIENT_ID: ${{ vars.GOOGLE_SIGNIN_CLIENT_ID }}
          GOOGLE_SIGNIN_CLIENT_SECRET: ${{ secrets.GOOGLE_SIGNIN_CLIENT_SECRET }}
